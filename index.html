<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#fde9d9" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="우리 친구" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-256.png" />
  <title>우리 친구</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" role="application" aria-label="친구 키우기 게임" data-stage="puppy" data-tod="day" data-breed="shiba">
    <header class="topbar">
      <h1 class="title" id="titleEl">
        <button id="petPickerBtn" class="pet-picker-btn" type="button" aria-label="펫 선택">
          <img id="titleAvatar" class="title-avatar" src="assets/shiba/idle.png" alt="" />
          <span id="titleName" class="pet-picker-name-tag">우리 친구</span>
          <span id="petPickerCount" class="pet-picker-count" hidden>1</span>
          <span class="pet-picker-plus-tag">+</span>
        </button>
      </h1>
      <div class="badges">
        <span id="stageBadge" class="badge stage-badge" aria-live="polite" hidden></span>
        <span id="todBadge" class="badge tod-badge" aria-live="polite" hidden></span>
        <span id="seasonBadge" class="badge season-badge" aria-live="polite" hidden></span>
        <button id="shopBtn" hidden></button>
        <button id="roomBtn" hidden></button>
        <span id="careBadge" class="pet-picker-btn" aria-live="polite" title="케어포인트">🌟 0<span id="careDot" class="care-dot" hidden></span></span>
      </div>
      <div class="header-btns">
        <button id="vetBtn" class="icon-btn" type="button" aria-label="병원" hidden>
          <span class="icon" aria-hidden="true">🏥</span>
          <span class="dot" id="vetDot"></span>
        </button>
        <button id="settingsBtn" class="icon-btn" type="button" aria-label="설정">
          <span class="icon" aria-hidden="true">⚙️</span>
        </button>
      </div>
    </header>

    <section class="stage" aria-label="친구">
      <div class="stage-side-buttons">
        <button id="healthBadge" class="side-btn health-side-btn" type="button" aria-label="종합 상태" title="종합 상태">
          <span class="health-emoji" id="healthEmoji">😊</span>
          <span class="health-score" id="healthScore">100</span>
        </button>
        <button id="stageShopBtn" class="side-btn icon-btn" type="button" aria-label="상점" title="상점">
          <span class="icon" aria-hidden="true">🛍️</span>
        </button>
        <button id="stageRoomBtn" class="side-btn icon-btn" type="button" aria-label="방 꾸미기" title="방 꾸미기">
          <span class="icon" aria-hidden="true">🛋️</span>
        </button>
        <button id="treatBtn" class="side-btn icon-btn treat-side-btn" type="button" aria-label="간식 주기" title="간식 주기" hidden>
          <span class="icon" aria-hidden="true">🦴</span>
          <span class="treat-count" id="treatCount">0</span>
        </button>
      </div>
      <button id="missionBtn" class="icon-btn mission-bottom" type="button" aria-label="일일 미션">
        <span class="icon" aria-hidden="true">📋</span>
        <span class="dot" id="missionDot" hidden></span>
      </button>
      <div class="ground"></div>
      <div class="window" aria-hidden="true">
        <div class="window-sky">
          <div class="w-sun"></div>
          <div class="w-moon"></div>
          <div class="w-star w-star1"></div>
          <div class="w-star w-star2"></div>
          <div class="w-star w-star3"></div>
          <div class="w-cloud w-cloud1">☁️</div>
          <div class="w-cloud w-cloud2">☁️</div>
        </div>
        <div class="window-frame"></div>
      </div>
      <div id="decoLayerBack" class="deco-layer deco-back" aria-hidden="true"></div>
      <div id="decoLayerFront" class="deco-layer deco-front" aria-hidden="true"></div>
      <div id="messLayer" class="mess-layer" aria-hidden="true"></div>
      <div class="puppy-wrap">
        <img id="puppy" class="puppy" src="assets/shiba/idle.png" alt="친구" draggable="false" />
      </div>
      <div id="evolveFx" class="evolve-fx" aria-hidden="true"></div>
      <div id="bubble" class="bubble" aria-hidden="true"></div>
    </section>

    <section class="actions" aria-label="할 수 있는 일">
      <button class="action a-feed"  data-action="feed"  type="button" aria-label="먹이 주기 (단축키 1)" aria-keyshortcuts="1">
        <div class="gauge" data-key="hunger">
          <div class="gauge-circle" style="--pct:80;--col:hsl(120,55%,48%)">
            <span class="emo" aria-hidden="true">🍖</span>
            <span class="pct">80</span>
          </div>
        </div>
        <span class="lbl">먹이</span>
      </button>
      <button class="action a-play"  data-action="play_menu"  type="button" aria-label="놀이 메뉴 열기 (단축키 2)" aria-keyshortcuts="2">
        <div class="gauge" data-key="happy">
          <div class="gauge-circle" style="--pct:80;--col:hsl(200,70%,55%)">
            <span class="emo" aria-hidden="true">💖</span>
            <span class="pct">80</span>
          </div>
        </div>
        <span class="lbl">놀이</span>
      </button>
      <button class="action a-walk" data-action="walk" type="button" aria-label="산책 (단축키 3)" aria-keyshortcuts="3">
        <div class="gauge" data-key="walk">
          <div class="gauge-circle" style="--pct:80;--col:hsl(30,75%,55%)">
            <span class="emo" aria-hidden="true">🚶</span>
            <span class="pct">80</span>
          </div>
        </div>
        <span class="lbl">산책</span>
      </button>
      <button class="action a-wash"  data-action="wash"  type="button" aria-label="씻기 (단축키 4)" aria-keyshortcuts="4">
        <div class="gauge" data-key="clean">
          <div class="gauge-circle" style="--pct:80;--col:hsl(150,55%,48%)">
            <span class="emo" aria-hidden="true">🫧</span>
            <span class="pct">80</span>
          </div>
        </div>
        <span class="lbl">씻기</span>
      </button>
      <button class="action a-sleep" data-action="sleep" type="button" aria-label="재우기 (단축키 5)" aria-keyshortcuts="5">
        <div class="gauge" data-key="energy">
          <div class="gauge-circle" style="--pct:80;--col:hsl(45,90%,55%)">
            <span class="emo" aria-hidden="true">⚡</span>
            <span class="pct">80</span>
          </div>
        </div>
        <span class="lbl">재우기</span>
      </button>
    </section>
  </main>

  <!-- 모달 백드롭 + 컨테이너 -->
  <div id="modalRoot" class="modal-root" hidden></div>

  <script src="game.js" defer></script>
</body>
</html>
